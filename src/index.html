<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080, initial-scale=1, user-scalable=no">
  <title>Lounge</title>
  <link rel="stylesheet" href="styles/main.css">
  <script src="webOS.js"></script>
</head>
<body>
  <div id="app">
    <div id="background-layer" aria-hidden="true"></div>
    <div id="scrim" aria-hidden="true"></div>

    <header class="top-bar">
      <div class="clock-stack">
        <div id="clock" class="clock"></div>
        <div id="clock-date" class="clock-date"></div>
      </div>
      <div class="top-actions">
        <button id="app-settings-btn" class="settings-icon focusable" type="button" aria-label="Settings" data-focus-index="90">
          <svg class="settings-icon-glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
      </div>
    </header>

    <main class="launcher">
      <nav id="input-row" class="input-row" aria-label="Inputs"></nav>
      <section id="app-grid" class="app-grid" aria-label="Apps"></section>
    </main>

    <footer id="music-bar" class="music-bar">
      <span class="music-icon" aria-hidden="true">♪</span>
      <span id="track-title" class="track-title">No music loaded</span>
      <div class="music-controls">
        <button id="mute-btn" type="button" class="mute-btn focusable" data-focus-index="800" aria-label="Mute" aria-pressed="false">🔉</button>
        <input id="volume-slider" class="volume-slider focusable" data-focus-index="801" type="range" min="0" max="50" value="15" aria-label="Ambient volume">
      </div>
    </footer>

    <div id="settings-panel" class="settings-panel" hidden></div>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <audio id="ambient-audio" preload="none"></audio>
  </div>

  <script src="main.js"></script>
</body>
</html>
